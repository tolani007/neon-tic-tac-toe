<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic-Tac-Toe</title>
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --bg-color: #050505;
        }

        body {
            background: linear-gradient(45deg, #1f0033 0%, #4b0082 25%, #3a0066 50%, #6600cc 75%, #1f0033 100%);
            background-size: 400% 400%;
            animation: liquid-stream 12s ease-in-out infinite;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 100%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes liquid-stream {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        h1 .steeze {
            text-transform: lowercase;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 80px #ff00ff;
        }

        h1 .tic {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
        }

        h1 .tac {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ffff00, 0 0 40px #ffff00, 0 0 80px #ffff00;
        }

        h1 .toe {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00ff00, 0 0 40px #00ff00, 0 0 80px #00ff00;
        }

        #announcement {
            font-size: 2rem;
            height: 3rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff;
        }

        .neon-x {
            color: var(--neon-cyan);
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan);
            animation: pulse-x 1.5s infinite alternate;
        }

        .neon-o {
            color: var(--neon-magenta);
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta), 0 0 80px var(--neon-magenta);
            animation: pulse-o 1.5s infinite alternate;
        }

        @keyframes pulse-x {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-cyan); }
            100% { text-shadow: 0 0 2px #fff, 0 0 5px #fff, 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
        }

        @keyframes pulse-o {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta), 0 0 80px var(--neon-magenta); }
            100% { text-shadow: 0 0 2px #fff, 0 0 5px #fff, 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta); }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2), 0 0 20px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.1);
            position: relative;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .board::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 10px;
            background: radial-gradient(400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.15), transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: inset 0 0 10px #000;
        }

        .cell:hover {
            background: #222;
            border-color: #555;
            box-shadow: 0 0 15px rgba(255,255,255,0.2), inset 0 0 15px rgba(255,255,255,0.2);
        }

        .cell.filled {
            cursor: default;
        }

        .cell.win {
            background: #2a2a2a;
            border-color: #fff;
            box-shadow: 0 0 20px #fff, inset 0 0 20px #fff;
            z-index: 10;
            transform: scale(1.05);
        }

        button.reset {
            margin-top: 30px;
            padding: 10px 30px;
            font-size: 1.2rem;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255,255,255,0.5), inset 0 0 10px rgba(255,255,255,0.5);
            text-shadow: 0 0 5px #fff;
        }

        button.reset:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff, 0 0 40px #fff;
        }

        .sound-toggle {
            margin-top: 15px;
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            opacity: 1;
            box-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>
    <canvas id="trailCanvas" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;"></canvas>

    <h1>
        <span class="steeze">steeze</span><span class="tic">TIC</span>-<span class="tac">TAC</span>-<span class="toe">TOE</span>
    </h1>
    <div id="announcement">Player X's Turn</div>

    <div class="board" id="board">
        <!-- Cells generated by JS -->
    </div>

    <button class="reset" onclick="resetGame()">Restart Game</button>
    
    <div style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
        <button id="soundToggle" class="sound-toggle" style="margin-top: 0;">Play Ethereal Pulsar</button>
    </div>

    <script>
        // --- Web Audio API (Generative Space Drones) ---
        let audioCtx;
        let activeNodes = [];
        let isPlaying = false;

        const soundToggle = document.getElementById('soundToggle');

        function stopAudio() {
            activeNodes.forEach(node => {
                try { if (node.stop) node.stop(); } catch(e) {}
                try { if (node.disconnect) node.disconnect(); } catch(e) {}
            });
            activeNodes = [];
        }

        function createOsc(freq, type, gainValue) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = gainValue;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            activeNodes.push(osc, gain);
            return { osc, gain };
        }

        function playPulsar() {
            const freqs = [220, 329.63, 440];
            freqs.forEach(f => {
                let { osc, gain } = createOsc(f, 'sine', 0);
                let lfo = audioCtx.createOscillator();
                let lfoGain = audioCtx.createGain();
                lfo.frequency.value = 0.5 + Math.random() * 0.5;
                lfoGain.gain.value = 0.03;
                lfo.connect(lfoGain);
                lfoGain.connect(gain.gain);
                lfo.start();
                activeNodes.push(lfo, lfoGain);
            });
        }

        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (!isPlaying) {
                playPulsar();

                isPlaying = true;
                soundToggle.textContent = 'Stop Pulsar';
                soundToggle.style.boxShadow = '0 0 10px #0ff';
                soundToggle.style.borderColor = '#0ff';
                soundToggle.style.color = '#0ff';
            } else {
                stopAudio();
                isPlaying = false;
                soundToggle.textContent = 'Play Ethereal Pulsar';
                soundToggle.style.boxShadow = 'none';
                soundToggle.style.borderColor = '#fff';
                soundToggle.style.color = '#fff';
            }
        }

        soundToggle.addEventListener('click', toggleSound);

        const boardEl = document.getElementById('board');
        const announcementEl = document.getElementById('announcement');

        async function fetchState() {
            const res = await fetch('/api/state');
            const state = await res.json();
            render(state);
        }

        async function makeMove(index) {
            const res = await fetch('/api/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            });
            if (res.ok) {
                const state = await res.json();
                render(state);
            }
        }

        async function resetGame() {
            const res = await fetch('/api/reset', { method: 'POST' });
            const state = await res.json();
            render(state);
        }

        function render(state) {
            boardEl.innerHTML = '';
            state.board.forEach((cellValue, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (cellValue !== '') {
                    cell.classList.add('filled');
                    cell.textContent = cellValue;
                    if (cellValue === 'X') cell.classList.add('neon-x');
                    if (cellValue === 'O') cell.classList.add('neon-o');
                }
                
                if (state.winningLine && state.winningLine.includes(index)) {
                    cell.classList.add('win');
                }

                cell.addEventListener('click', () => {
                    if (!state.winner && !state.isDraw && cellValue === '') {
                        makeMove(index);
                    }
                });

                boardEl.appendChild(cell);
            });

            if (state.winner) {
                announcementEl.textContent = `Player ${state.winner} Wins!`;
                if (state.winner === 'X') {
                    announcementEl.className = 'neon-x';
                } else {
                    announcementEl.className = 'neon-o';
                }
                if (window.triggerThumbsUp) window.triggerThumbsUp();
                if (window.trippyConfetti && !state.confettiTriggered) {
                    window.trippyConfetti();
                    state.confettiTriggered = true; // prevent re-trigger on re-render
                }
            } else if (state.isDraw) {
                announcementEl.textContent = "It's a Draw!";
                announcementEl.className = '';
                announcementEl.style.textShadow = '0 0 10px #fff, 0 0 20px #fff';
                if (window.resetThumbsUp) window.resetThumbsUp();
                if (window.stopConfetti) window.stopConfetti();
                state.confettiTriggered = false;
            } else {
                announcementEl.textContent = `Player ${state.currentPlayer}'s Turn`;
                if (state.currentPlayer === 'X') {
                    announcementEl.className = 'neon-x';
                } else {
                    announcementEl.className = 'neon-o';
                }
                if (window.resetThumbsUp) window.resetThumbsUp();
                if (window.stopConfetti) window.stopConfetti();
                state.confettiTriggered = false;
            }
        }

        // Initial render
        fetchState();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let confettiInterval;
        window.trippyConfetti = function() {
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            confettiInterval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(confettiInterval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                // Trippy colors
                const colors = ['#0ff', '#f0f', '#ff0', '#0f0', '#800080'];

                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 },
                    colors: colors,
                    shapes: ['circle', 'square', 'star'],
                    scalar: randomInRange(0.5, 2),
                    drift: randomInRange(-2, 2),
                    gravity: randomInRange(0.2, 1.5),
                }));
            }, 250);
        };

        window.stopConfetti = function() {
            if (confettiInterval) {
                clearInterval(confettiInterval);
            }
            confetti.reset();
        };
    </script>

    <div id="emoji-container" style="position: absolute; top: 20px; right: 20px; width: 300px; height: 300px; z-index: 10; pointer-events: none;"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const emojiContainer = document.getElementById('emoji-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(300, 300);
        emojiContainer.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const emojiGroup = new THREE.Group();
        scene.add(emojiGroup);

        const yellowMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
        const blackMat = new THREE.MeshLambertMaterial({ color: 0x000000 });

        // Head
        const headGeo = new THREE.SphereGeometry(1.5, 32, 32);
        const head = new THREE.Mesh(headGeo, yellowMat);
        emojiGroup.add(head);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const eyeR = new THREE.Mesh(eyeGeo, blackMat);
        eyeR.position.set(0.5, 0.4, 1.35);
        emojiGroup.add(eyeR);
        const eyeL = new THREE.Mesh(eyeGeo, blackMat);
        eyeL.position.set(-0.5, 0.4, 1.35);
        emojiGroup.add(eyeL);

        // Smile
        const smileGeo = new THREE.TorusGeometry(0.6, 0.1, 16, 32, Math.PI);
        const smile = new THREE.Mesh(smileGeo, blackMat);
        smile.position.set(0, -0.2, 1.4);
        smile.rotation.z = Math.PI; // flip to smile
        emojiGroup.add(smile);

        // Right Arm Group
        const armGroup = new THREE.Group();
        armGroup.position.set(1.6, 0, 0);
        emojiGroup.add(armGroup);

        // Hand
        const handGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const hand = new THREE.Mesh(handGeo, yellowMat);
        armGroup.add(hand);

        // Thumb
        const thumbGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 16);
        const thumb = new THREE.Mesh(thumbGeo, yellowMat);
        thumb.position.set(0, 0.4, 0);
        thumb.visible = false;
        armGroup.add(thumb);

        camera.position.set(0, 0, 6);
        camera.lookAt(0, 0, 0);

        let targetRotationX = 0;
        let targetRotationY = 0;
        let isWinning = false;
        let winAnimTime = 0;

        window.addEventListener('mousemove', (e) => {
            // Get the bounding box of the emoji container
            const rect = emojiContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Calculate vector from emoji to mouse
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            
            // Limit the rotation angle (max ~45 degrees / 0.8 rad)
            targetRotationY = Math.atan2(dx, 300); 
            targetRotationX = Math.atan2(dy, 300);
        });

        window.triggerThumbsUp = function() {
            isWinning = true;
            thumb.visible = true;
        };

        window.resetThumbsUp = function() {
            isWinning = false;
            thumb.visible = false;
            armGroup.rotation.z = 0;
            armGroup.position.y = 0;
        };

        function animateEmoji() {
            requestAnimationFrame(animateEmoji);

            // Smoothly interpolate rotation
            emojiGroup.rotation.y += (targetRotationY - emojiGroup.rotation.y) * 0.1;
            emojiGroup.rotation.x += (targetRotationX - emojiGroup.rotation.x) * 0.1;

            if (isWinning) {
                winAnimTime += 0.1;
                armGroup.position.y = Math.sin(winAnimTime) * 0.2;
                armGroup.rotation.z = Math.sin(winAnimTime) * 0.2;
            } else {
                winAnimTime = 0;
                armGroup.position.y = 0;
                armGroup.rotation.z = 0;
            }

            renderer.render(scene, camera);
        }
        animateEmoji();

        // --- Enterprise Grade Liquid Parallax & Ribbon ---
        const trailCanvas = document.getElementById('trailCanvas');
        const trailCtx = trailCanvas.getContext('2d');
        
        function resizeTrail() {
            trailCanvas.width = window.innerWidth;
            trailCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeTrail);
        resizeTrail();

        // Parallax & Spotlight state
        let targetTiltX = 0;
        let targetTiltY = 0;
        let currentTiltX = 0;
        let currentTiltY = 0;

        // Liquid Ribbon state
        const numPoints = 25;
        const points = [];
        for (let i = 0; i < numPoints; i++) {
            points.push({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
        }
        let mousePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        window.addEventListener('mousemove', (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;

            // Parallax calculations
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            targetTiltY = -xAxis; // rotateY
            targetTiltX = yAxis;  // rotateX

            // Spotlight calculations
            if (boardEl) {
                const rect = boardEl.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                boardEl.style.setProperty('--mouse-x', `${x}px`);
                boardEl.style.setProperty('--mouse-y', `${y}px`);
            }
        });

        function animateEnterprise() {
            requestAnimationFrame(animateEnterprise);

            // 1. Smooth Parallax Board
            currentTiltX += (targetTiltX - currentTiltX) * 0.1;
            currentTiltY += (targetTiltY - currentTiltY) * 0.1;
            if (boardEl) {
                boardEl.style.transform = `perspective(1000px) rotateX(${currentTiltX}deg) rotateY(${currentTiltY}deg) scale3d(1.02, 1.02, 1.02)`;
            }

            // 2. Liquid Ribbon Physics
            // Lead point follows mouse smoothly
            points[0].x += (mousePos.x - points[0].x) * 0.5;
            points[0].y += (mousePos.y - points[0].y) * 0.5;

            // Follow points
            for (let i = 1; i < numPoints; i++) {
                points[i].x += (points[i - 1].x - points[i].x) * 0.45;
                points[i].y += (points[i - 1].y - points[i].y) * 0.45;
                
                // Board Repulsion (Fluidly wrap around the tic-tac-toe board)
                if (boardEl) {
                    const rect = boardEl.getBoundingClientRect();
                    const pad = 15;
                    if (points[i].x > rect.left - pad && points[i].x < rect.right + pad &&
                        points[i].y > rect.top - pad && points[i].y < rect.bottom + pad) {
                        
                        // Find nearest edge and push out
                        const dLeft = points[i].x - (rect.left - pad);
                        const dRight = (rect.right + pad) - points[i].x;
                        const dTop = points[i].y - (rect.top - pad);
                        const dBottom = (rect.bottom + pad) - points[i].y;

                        const minD = Math.min(dLeft, dRight, dTop, dBottom);
                        
                        if (minD === dLeft) points[i].x = rect.left - pad;
                        else if (minD === dRight) points[i].x = rect.right + pad;
                        else if (minD === dTop) points[i].y = rect.top - pad;
                        else if (minD === dBottom) points[i].y = rect.bottom + pad;
                    }
                }
            }

            // 3. Render Liquid Ribbon (Chromatic Blob Effect)
            trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            trailCtx.globalCompositeOperation = 'screen';
            trailCtx.globalAlpha = 0.9;

            for (let i = 0; i < points.length; i++) {
                // Taper size towards the tail
                const size = (points.length - i) * 0.5;
                if (size < 0.5) continue;

                // Cyan Offset (Chromatic Aberration)
                trailCtx.beginPath();
                trailCtx.arc(points[i].x - 3, points[i].y, size, 0, Math.PI * 2);
                trailCtx.fillStyle = '#0ff';
                trailCtx.shadowColor = '#0ff';
                trailCtx.shadowBlur = 10;
                trailCtx.fill();

                // Magenta Offset
                trailCtx.beginPath();
                trailCtx.arc(points[i].x + 3, points[i].y, size, 0, Math.PI * 2);
                trailCtx.fillStyle = '#f0f';
                trailCtx.shadowColor = '#f0f';
                trailCtx.shadowBlur = 10;
                trailCtx.fill();

                // Bright White Core
                trailCtx.beginPath();
                trailCtx.arc(points[i].x, points[i].y, size * 0.6, 0, Math.PI * 2);
                trailCtx.fillStyle = '#fff';
                trailCtx.shadowBlur = 0;
                trailCtx.fill();
            }
        }
        animateEnterprise();
    </script>
</body>
</html>
